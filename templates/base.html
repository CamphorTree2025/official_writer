<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}公文写作助手{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <span class="nav-brand-icon">文</span>
            公文写作助手
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link" id="nav-home">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">首页</span>
            </a>
            <a href="/config" class="nav-link" id="nav-config">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">API配置</span>
            </a>
            <a href="/templates" class="nav-link" id="nav-templates">
                <span class="nav-icon">📄</span>
                <span class="nav-label">模板管理</span>
            </a>
            <a href="/generate" class="nav-link" id="nav-generate">
                <span class="nav-icon">✍️</span>
                <span class="nav-label">生成公文</span>
            </a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast 容器 -->
    <div class="toast-container"></div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
