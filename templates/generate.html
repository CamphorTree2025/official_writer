{% extends "base.html" %}

{% block title %}生成公文 - 公文写作助手{% endblock %}

{% block content %}
<div class="page-header">
    <h1>生成公文</h1>
    <p class="subtitle">选择模板并输入内容，AI将按照模板格式生成规范公文</p>
</div>

<div class="card">
    <h2>选择模板</h2>
    <div class="form-group">
        <label for="template-select">模板文件</label>
        <select id="template-select" name="template">
            <option value="">-- 请选择模板 --</option>
        </select>
    </div>
    <div id="variable-info" class="variable-info"></div>
</div>

<div class="card">
    <h2>选择模型</h2>
    <div class="form-group">
        <label for="model-select">大模型</label>
        <select id="model-select" name="model">
            <option value="minimax">Minimax</option>
            <option value="glm">智谱GLM</option>
        </select>
    </div>
</div>

<div class="card">
    <h2>输入内容</h2>
    <div class="form-group">
        <label for="user-input">公文内容描述</label>
        <textarea id="user-input" name="input" rows="6"
            placeholder="请输入要生成的公文内容描述，例如：关于召开2024年度安全生产工作会议的通知"></textarea>
    </div>
    <div class="form-group">
        <label for="output-name">输出文件名</label>
        <input type="text" id="output-name" name="output_name" value="公文.docx">
    </div>
    <div class="form-actions">
        <button type="button" class="btn btn-primary" id="btn-preview" onclick="previewVariables()">预览变量</button>
    </div>
</div>

<!-- 变量编辑区域 -->
<div id="variable-edit-card" class="card" style="display:none;">
    <h2>编辑变量内容</h2>
    <p class="info-text">请检查并编辑以下变量的填充内容：</p>
    <div id="variable-edit-list" class="variable-edit-list"></div>
    <div class="form-actions">
        <button type="button" class="btn btn-secondary" onclick="backToInput()">返回修改</button>
        <button type="button" class="btn btn-primary" onclick="generateDoc()">生成公文</button>
    </div>
    <div id="generate-result" class="result-message"></div>
</div>

<div id="preview-card" class="card" style="display:none;">
    <h2>生成结果</h2>
    <div id="preview-content"></div>
</div>
{% endblock %}

{% block scripts %}
{% raw %}
<script>
let selectedTemplate = '';
let variables = [];
let filledVariables = {};

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function loadTemplates() {
    try {
        const response = await fetch('/api/templates');
        const templates = await response.json();
        const select = document.getElementById('template-select');
        select.innerHTML = '<option value="">-- 请选择模板 --</option>';

        for (const t of templates) {
            const option = document.createElement('option');
            option.value = t.name;
            option.textContent = t.name;
            select.appendChild(option);
        }

        // 检查URL参数
        const params = new URLSearchParams(window.location.search);
        const templateParam = params.get('template');
        if (templateParam) {
            select.value = decodeURIComponent(templateParam);
            if (select.value) {
                select.dispatchEvent(new Event('change'));
            }
        }

    } catch (error) {
        console.error('加载模板失败:', error);
    }
}

document.getElementById('template-select').addEventListener('change', async (e) => {
    const filename = e.target.value;
    selectedTemplate = filename;
    const infoDiv = document.getElementById('variable-info');

    if (!filename) {
        infoDiv.innerHTML = '';
        variables = [];
        return;
    }

    try {
        const response = await fetch(`/api/template/variables?name=${encodeURIComponent(filename)}`);
        const data = await response.json();

        if (data.error) {
            infoDiv.innerHTML = `<p class="error">错误: ${data.error}</p>`;
            if (data.available) {
                infoDiv.innerHTML += `<p class="info">可用文件: ${data.available.join(', ')}</p>`;
            }
        } else if (data.variables && data.variables.length > 0) {
            variables = data.variables;
            infoDiv.innerHTML = `<p><strong>模板变量：</strong>${data.variables.join(', ')}</p>`;
        } else {
            variables = [];
            let html = '<p class="info">此模板暂无变量</p>';
            if (data.text_preview) {
                html += `<details><summary>查看模板内容</summary><pre style="max-height:200px;overflow:auto;">${escapeHtml(data.text_preview)}</pre></details>`;
            }
            infoDiv.innerHTML = html;
        }
    } catch (error) {
        infoDiv.innerHTML = `<p class="error">获取变量失败: ${error.message}</p>`;
    }
});

async function previewVariables() {
    const templateName = document.getElementById('template-select').value;
    const userInput = document.getElementById('user-input').value.trim();
    const model = document.getElementById('model-select').value;
    const infoDiv = document.getElementById('variable-info');

    if (!templateName) {
        alert('请选择模板');
        return;
    }

    if (!userInput) {
        alert('请输入公文内容描述');
        return;
    }

    // 显示加载状态
    infoDiv.innerHTML = '<p class="loading">正在调用AI填充变量，请稍候...</p>';
    document.getElementById('btn-preview').disabled = true;

    try {
        const response = await fetch('/api/preview', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                template_name: templateName,
                input: userInput,
                model: model
            })
        });
        const data = await response.json();

        document.getElementById('btn-preview').disabled = false;

        if (data.error) {
            infoDiv.innerHTML = `<p class="error">预览失败: ${data.error}</p>`;
            return;
        }

        filledVariables = data.variables || {};
        showVariableEditor(data.variables || {});

    } catch (error) {
        document.getElementById('btn-preview').disabled = false;
        infoDiv.innerHTML = `<p class="error">预览失败: ${error.message}</p>`;
    }
}

function showVariableEditor(vars) {
    const card = document.getElementById('variable-edit-card');
    const list = document.getElementById('variable-edit-list');
    const inputCard = document.querySelectorAll('.card');

    // 隐藏输入区域（除了变量编辑区）
    inputCard.forEach(c => {
        if (c.id !== 'variable-edit-card') {
            c.style.display = 'none';
        }
    });

    // 构建变量编辑表单
    let html = '';
    for (const [key, value] of Object.entries(vars)) {
        html += `
            <div class="form-group variable-edit-item">
                <label for="var-${escapeHtml(key)}">${escapeHtml(key)}</label>
                <textarea id="var-${escapeHtml(key)}" name="${escapeHtml(key)}" rows="3">${escapeHtml(value)}</textarea>
            </div>
        `;
    }

    if (html === '') {
        html = '<p class="info">没有需要编辑的变量</p>';
    }

    list.innerHTML = html;
    card.style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function backToInput() {
    // 显示输入区域
    document.querySelectorAll('.card').forEach(c => {
        c.style.display = 'block';
    });
    document.getElementById('variable-edit-card').style.display = 'none';
    document.getElementById('preview-card').style.display = 'none';

    // 恢复变量信息显示
    if (variables.length > 0) {
        document.getElementById('variable-info').innerHTML =
            `<p><strong>模板变量：</strong>${variables.join(', ')}</p>`;
    }
}

async function generateDoc() {
    const templateName = document.getElementById('template-select').value;
    const userInput = document.getElementById('user-input').value.trim();
    const outputName = document.getElementById('output-name').value.trim() || '公文.docx';
    const model = document.getElementById('model-select').value;
    const resultDiv = document.getElementById('generate-result');

    if (!outputName.endsWith('.docx')) {
        outputName += '.docx';
    }

    // 收集用户编辑后的变量值
    const filledContent = {};
    for (const key of Object.keys(filledVariables)) {
        const textarea = document.getElementById(`var-${key}`);
        if (textarea) {
            filledContent[key] = textarea.value;
        }
    }

    resultDiv.innerHTML = '<p class="info">正在生成，请稍候...</p>';
    resultDiv.style.display = 'block';

    try {
        const response = await fetch('/api/generate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                template_name: templateName,
                input: userInput,
                output_name: outputName,
                model: model,
                filled_content: filledContent
            })
        });

        const data = await response.json();

        if (data.success) {
            resultDiv.innerHTML = `<p class="success">生成成功！<a href="/api/output/${encodeURIComponent(data.output_name)}" target="_blank">下载文件</a></p>`;
            document.getElementById('preview-card').style.display = 'block';
            document.getElementById('preview-content').innerHTML =
                `<p>文件已生成：<a href="/api/output/${encodeURIComponent(data.output_name)}">${escapeHtml(data.output_name)}</a></p>`;
        } else {
            resultDiv.innerHTML = `<p class="error">生成失败: ${data.error || '未知错误'}</p>`;
        }
    } catch (error) {
        resultDiv.innerHTML = `<p class="error">生成失败: ${error.message}</p>`;
    }
}

loadTemplates();
</script>
{% endraw %}
{% endblock %}
